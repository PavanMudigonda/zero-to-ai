name: zero-to-ai
channels:
  - pytorch
  - conda-forge
  - defaults

dependencies:
  # ============================================================================
  # Core Python
  # ============================================================================
  - python=3.11
  
  # ============================================================================
  # Jupyter & Development
  # ============================================================================
  - jupyter>=1.1.0
  - jupyterlab>=4.3.0
  - ipykernel>=6.29.0
  - notebook>=7.3.0
  - ipywidgets>=8.1.0
  - nbconvert>=7.16.0
  - nbformat>=5.10.0
  
  # ============================================================================
  # Scientific Computing
  # ============================================================================
  - numpy>=2.1.0
  - pandas>=2.2.0
  - scipy>=1.14.0
  - matplotlib>=3.10.0
  - seaborn>=0.13.0
  - plotly>=5.24.0
  
  # ============================================================================
  # Machine Learning Fundamentals
  # ============================================================================
  - scikit-learn>=1.6.0
  
  # ============================================================================
  # Statistical Analysis
  # ============================================================================
  - statsmodels>=0.14.0
  
  # ============================================================================
  # Deep Learning (PyTorch)
  # ============================================================================
  - pytorch>=2.5.0
  - torchvision>=0.20.0
  - torchaudio>=2.5.0
  - cpuonly  # Remove this line if you have CUDA GPU (use: pytorch-cuda=12.1)
  
  # ============================================================================
  # Computer Vision & Image Processing
  # ============================================================================
  - pillow>=11.0.0
  - opencv>=4.10.0
  
  # ============================================================================
  # Data Processing & Utilities
  # ============================================================================
  - requests>=2.32.0
  - tqdm>=4.67.0
  - click>=8.1.0
  - pyyaml>=6.0.0
  
  # ============================================================================
  # NLP Tools (conda-available)
  # ============================================================================
  - spacy>=3.8.0
  - nltk>=3.9.0
  
  # ============================================================================
  # Development & Testing
  # ============================================================================
  - pytest>=7.4.0
  - pytest-cov>=4.1.0
  - black>=23.7.0
  - flake8>=6.1.0
  - mypy>=1.5.0
  
  # ============================================================================
  # Database & Storage
  # ============================================================================
  - psycopg2>=2.9.10
  - pymongo>=4.10.0
  - redis-py>=5.2.0
  
  # ============================================================================
  # pip-only packages
  # ============================================================================
  - pip>=24.0
  - pip:
    # --- Transformers & Datasets ---
    - transformers>=4.47.0
    - datasets>=3.2.0
    - tokenizers>=0.20.0
    - sentencepiece>=0.2.0
    - tiktoken>=0.8.0
    
    # --- Fine-tuning & PEFT ---
    - peft>=0.13.0
    - accelerate>=1.2.0
    - bitsandbytes>=0.45.0
    - trl>=0.12.0
    - safetensors>=0.4.0
    
    # --- Embeddings & Semantic Search ---
    - sentence-transformers>=3.3.0
    
    # --- Vector Databases (Cloud) ---
    - chromadb>=0.5.23
    - qdrant-client>=1.12.0
    - weaviate-client>=4.9.3
    - pymilvus>=2.4.9
    - pinecone-client>=5.0.0
    
    # --- Vector Databases (Self-hosted) ---
    - faiss-cpu>=1.9.0  # Use faiss-gpu for GPU support
    - pgvector>=0.3.6
    - elasticsearch>=8.16.0
    
    # --- Cloud AI Platforms ---
    - google-cloud-aiplatform>=1.73.0
    - azure-search-documents>=11.6.0
    - azure-identity>=1.19.0
    - opensearch-py>=2.7.0
    
    # --- RAG & LLM Frameworks ---
    - langchain>=0.3.0
    - langchain-community>=0.3.0
    - langchain-openai>=0.2.0
    - llama-index>=0.12.0
    
    # --- Diffusion & Multimodal ---
    - diffusers>=0.32.0
    - timm>=1.0.0
    
    # --- API Clients ---
    - openai>=1.58.0
    - anthropic>=0.40.0
    
    # --- Local LLMs ---
    - ollama>=0.4.0
    - vllm>=0.6.0
    
    # --- NLP Evaluation Tools ---
    - seqeval>=1.2.0
    - sacrebleu>=2.4.0
    - rouge-score>=0.1.2
    
    # --- MLOps: Experiment Tracking ---
    - mlflow>=2.17.0
    - wandb>=0.18.0
    
    # --- MLOps: API Development ---
    - fastapi>=0.115.0
    - uvicorn>=0.32.0
    - pydantic>=2.10.0
    - joblib>=1.4.0
    
    # --- MLOps: Monitoring ---
    - prometheus-client>=0.21.0
    - psutil>=6.1.0
    
    # --- Statistical Analysis ---
    - lifelines>=0.30.0
    
    # --- AWS Tools ---
    - boto3>=1.35.0
    - awscli>=1.35.0
    
    # --- Utilities ---
    - python-dotenv>=1.0.0
    - huggingface-hub>=0.27.0

# ============================================================================
# Post-installation steps:
# ============================================================================
# 1. Download spaCy language models:
#    python -m spacy download en_core_web_sm
#
# 2. For GPU support:
#    - Remove 'cpuonly' dependency
#    - Add: pytorch-cuda=12.1 (or appropriate CUDA version)
#    - Use faiss-gpu instead of faiss-cpu
#
# 3. For vector databases:
#    - Some require Docker for local development
#    - Check individual documentation for setup
